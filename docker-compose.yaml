services:
  mysql-db:
    image: mysql:9.7.1
    container_name: sql_learning_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: sql_learning
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    volumes:
      - "mysql_data:/var/lib/mysql"

volumes:
  mysql_data:
