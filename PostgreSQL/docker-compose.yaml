services:
  postgres-db:
    image: postgres:17
    container_name: sql_learning_postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_learning
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

volumes:
  postgres_data:
